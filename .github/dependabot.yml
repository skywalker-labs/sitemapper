version: 2
updates:
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    reviewers:
      - "skywalker-labs"
    assignees:
      - "skywalker-labs"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"

# Enable version updates for GitHub Actions

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "07:00"
      timezone: "UTC"
    open-pull-requests-limit: 5
    reviewers:
      - "skywalker-labs"
    assignees:
      - "skywalker-labs"
    commit-message:
      prefix: "ci"
      include: "scope"
    # Group GitHub Actions updates
    groups:
      github-actions:
        patterns:
          - "actions/*"
          - "github/*"
